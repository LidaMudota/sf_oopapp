<div class="kanban-board">
  <div class="kanban-column" data-status="backlog">
    <h2>Backlog</h2>
    <ul class="task-list" id="backlog-tasks"
        ondrop="handleDrop(event)"
        ondragover="allowDrop(event)">
    </ul>
  </div>
  <div class="kanban-column" data-status="ready">
    <h2>Ready</h2>
    <ul class="task-list" id="ready-tasks"
        ondrop="handleDrop(event)"
        ondragover="allowDrop(event)">
    </ul>
  </div>
  <div class="kanban-column" data-status="in-progress">
    <h2>In Progress</h2>
    <ul class="task-list" id="in-progress-tasks"
        ondrop="handleDrop(event)"
        ondragover="allowDrop(event)">
    </ul>
  </div>
  <div class="kanban-column" data-status="finished">
    <h2>Finished</h2>
    <ul class="task-list" id="finished-tasks"
        ondrop="handleDrop(event)"
        ondragover="allowDrop(event)">
    </ul>
  </div>
</div>
<div class="task-controls">
  <input id="task-input" type="text" placeholder="New Task" class="form-control d-none" />
  <button id="submit-task-btn" class="btn btn-success d-none">Submit Task</button>
  <button id="add-task-btn" class="btn btn-primary">Add Task</button>
</div>
